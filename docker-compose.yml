version: '3.8'

services:
  # --- Infrastructure Services ---
  postgres:
    image: postgres:16-alpine
    container_name: omni_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: omniagent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omni_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: omni_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: omni_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: omni_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # --- Application Services ---
  backend-gateway:
    build: ./backend-gateway
    container_name: omni_gateway
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://user:password@postgres:5432/omniagent
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BROKER=kafka:29092
      - KAFKA_CLIENT_ID=omniagent-gateway
      - KAFKA_CONSUMER_GROUP_ID=omniagent-execution-consumers

  ai-workers:
    build: ./ai-workers
    container_name: omni_workers
    depends_on:
      - kafka
      - qdrant
    environment:
      - KAFKA_BROKER=kafka:29092
      - KAFKA_CONSUMER_GROUP_ID=omniagent-ai-workers
      - OPENAI_API_KEY=mock-key-for-local-testing
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_CACHE_COLLECTION=omniagent-semantic-cache

  frontend:
    build: ./frontend
    container_name: omni_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3001

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
