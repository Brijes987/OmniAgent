name: OmniAgent CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # --- Job 1: Test the Frontend Client ---
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Build test execution
        run: cd frontend && npm run build

  # --- Job 2: Test the Express Gateway ---
  test-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './backend-gateway/package-lock.json'
      - name: Install Dependencies
        run: cd backend-gateway && npm ci
      - name: Run Schema Compilation
        run: cd backend-gateway && npx prisma generate
      - name: Run Jest Testing Suites
        run: cd backend-gateway && npm test

  # --- Job 3: Test Python Workers ---
  test-ai-workers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          cd ai-workers
          pip install -r requirements.txt
      - name: Run Pytest suites
        run: cd ai-workers && python -m pytest tests/ -v

  # --- Job 4: Secure Multi-Image Docker Build Check ---
  docker-validation:
    needs: [test-frontend, test-gateway, test-ai-workers]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Dry-run Docker Compose compilation
        run: |
          # Try both docker-compose and docker compose
          if command -v docker-compose &> /dev/null; then
            docker-compose config
          else
            docker compose config
          fi
